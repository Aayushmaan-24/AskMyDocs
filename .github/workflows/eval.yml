name: RAG Eval CI Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "qdrant-client==1.18.0" \
            fastembed bm25s groq pypdf \
            python-dotenv rank-bm25 tiktoken rich numpy \
            sentence-transformers datasets \
            pytest pytest-asyncio \
            "langchain-groq==0.1.9" \
            "langchain-community==0.2.19" \
            "langchain-core==0.2.43"

      - name: Run ingestion + indexing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m src.ingestion
          python -m src.indexing

      - name: Run eval (CI mode — 5 questions)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CI: "true"
        run: |
          pytest tests/eval_ragas.py -v --tb=short 2>&1 | tee eval_output.txt

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval_output.txt
            tests/last_eval_scores.json
